<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Medicine Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-pills"></i>
                </div>
                <h1>Create Account</h1>
                <p>Start tracking your medications today</p>
            </div>
            
            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" th:field="*{name}" placeholder="Enter your full name" required>
                    </div>
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-text"></span>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" th:field="*{email}" placeholder="Enter your email" required>
                    </div>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-text"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" th:field="*{password}" placeholder="Create a password" required>
                    </div>
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-text"></span>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm your password" required>
                    </div>
                    <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error-text"></span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
            </div>
        </div>
        
        <div class="auth-bg">
            <div class="auth-bg-shape"></div>
            <div class="auth-bg-shape shape-2"></div>
        </div>
    </div>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
