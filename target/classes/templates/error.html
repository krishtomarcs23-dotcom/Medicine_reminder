<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Medicine Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo error">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h1>Oops! Something went wrong</h1>
                <p th:text="${error}">An error occurred</p>
            </div>
            
            <div class="auth-form">
                <a th:href="@{/dashboard}" class="btn btn-primary btn-block">
                    <i class="fas fa-home"></i> Go to Dashboard
                </a>
                <a th:href="@{/logout}" class="btn btn-secondary btn-block" style="margin-top: 10px;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </div>
</body>
</html>
