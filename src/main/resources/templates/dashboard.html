<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Medicine Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" th:replace="~{layout :: sidebar}"></aside>
        
        <main class="main-content">
            <header class="main-header" th:replace="~{layout :: header}"></header>
            
            <div class="content">
                <div class="welcome-section">
                    <h1>Welcome back, <span th:text="${user.name}">User</span>!</h1>
                    <p>Here's your medicine overview for today</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="fas fa-pills"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${todayMedicinesCount}">0</h3>
                            <p>Today's Medicines</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${todayTakenCount}">0</h3>
                            <p>Taken Today</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon red">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${todayMissedCount}">0</h3>
                            <p>Missed Today</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <i class="fas fa-bell"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${activeRemindersCount}">0</h3>
                            <p>Active Reminders</p>
                        </div>
                    </div>
                </div>
                
                <div class="content-grid">
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-history"></i> Recent Activity</h2>
                        </div>
                        <div class="card-body">
                            <div th:if="${recentActivity.empty}" class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No recent activity</p>
                            </div>
                            <div class="activity-list" th:unless="${recentActivity.empty}">
                                <div class="activity-item" th:each="activity : ${recentActivity}">
                                    <div class="activity-icon" 
                                         th:classappend="${activity.status.name() == 'TAKEN'} ? 'green' : (${activity.status.name() == 'MISSED'} ? 'red' : 'gray')">
                                        <i th:class="${activity.status.name() == 'TAKEN'} ? 'fas fa-check' : (${activity.status.name() == 'MISSED'} ? 'fas fa-times' : 'fas fa-clock')"></i>
                                    </div>
                                    <div class="activity-details">
                                        <h4 th:text="${activity.medicine?.name}">Medicine Name</h4>
                                        <p>
                                            <span th:text="${activity.status}">Status</span> - 
                                            <span th:text="${#temporals.format(activity.scheduledTime, 'MMM dd, HH:mm')}">Time</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
                        </div>
                        <div class="card-body">
                            <div class="quick-actions">
                                <a th:href="@{/medicines/new}" class="action-btn">
                                    <i class="fas fa-plus-circle"></i>
                                    <span>Add Medicine</span>
                                </a>
                                <a th:href="@{/medicines}" class="action-btn">
                                    <i class="fas fa-list"></i>
                                    <span>View Medicines</span>
                                </a>
                                <a th:href="@{/prescriptions}" class="action-btn">
                                    <i class="fas fa-file-upload"></i>
                                    <span>Upload Prescription</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
