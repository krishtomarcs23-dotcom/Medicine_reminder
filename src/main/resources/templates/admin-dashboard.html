<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Medicine Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" th:replace="~{layout :: sidebar}"></aside>
        
        <main class="main-content">
            <header class="main-header" th:replace="~{layout :: header}"></header>
            
            <div class="content">
                <div class="page-header">
                    <div>
                        <h1>Admin Dashboard</h1>
                        <p>System overview and analytics</p>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${dashboard.totalUsers}">0</h3>
                            <p>Total Users</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="fas fa-pills"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${dashboard.activeReminders}">0</h3>
                            <p>Active Reminders</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${dashboard.todayTaken}">0</h3>
                            <p>Taken Today</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon red">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 th:text="${dashboard.todayMissed}">0</h3>
                            <p>Missed Today</p>
                        </div>
                    </div>
                </div>
                
                <div class="content-grid">
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-users"></i> Quick Stats</h2>
                        </div>
                        <div class="card-body">
                            <div class="quick-stats">
                                <div class="quick-stat-item">
                                    <span class="label">Total Medicines</span>
                                    <span class="value" th:text="${dashboard.totalMedicines}">0</span>
                                </div>
                                <div class="quick-stat-item">
                                    <span class="label">Total Prescriptions</span>
                                    <span class="value" th:text="${dashboard.totalPrescriptions}">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
                        </div>
                        <div class="card-body">
                            <div class="quick-actions">
                                <a th:href="@{/admin/users}" class="action-btn">
                                    <i class="fas fa-user-cog"></i>
                                    <span>Manage Users</span>
                                </a>
                                <a th:href="@{/admin/medicines}" class="action-btn">
                                    <i class="fas fa-capsules"></i>
                                    <span>View Medicines</span>
                                </a>
                                <a th:href="@{/admin/prescriptions}" class="action-btn">
                                    <i class="fas fa-file-medical"></i>
                                    <span>View Prescriptions</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
